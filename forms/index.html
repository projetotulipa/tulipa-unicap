<!DOCTYPE html>

  <!-- flora seca estática (verde/creme) -->
  <svg class="ff-flora ff-flora--left" viewBox="0 0 190 700" preserveAspectRatio="xMinYMin meet" aria-hidden="true">
    <defs>
      <linearGradient id="leafA" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#8FA084" stop-opacity="0.9"/><stop offset="1" stop-color="#5A6E45" stop-opacity="0.55"/>

      </linearGradient>

        <stop offset="0" stop-color="#E0CFA8"/><stop offset="1" stop-color="#B7A06E"/>

    </defs>
    <!-- eucalipto curvado -->
    <g>
      <path d="M52 12 Q 66 140, 40 290 Q 64 430, 78 560 Q 70 640, 56 690" stroke="url(#stemA)" stroke-width="1.4" fill="none"/>
      <ellipse cx="50" cy="70"  rx="12" ry="8"  fill="url(#leafA)" transform="rotate(-16 50 70)"/>

      <ellipse cx="52" cy="306" rx="12" ry="7.5" fill="url(#leafA)" transform="rotate(15 52 306)"/>
      <ellipse cx="58" cy="356" rx="11" ry="7"  fill="url(#leafA)" transform="rotate(-8 58 356)"/>
      <ellipse cx="68" cy="404" rx="11" ry="7"  fill="url(#leafA)" transform="rotate(20 68 404)"/>
      <ellipse cx="74" cy="452" rx="10" ry="6.5" fill="url(#leafA)" transform="rotate(-12 74 452)"/>

    <!-- tulipa seca creme -->
    <g transform="translate(108 250)">

        <path d="M0 -2 C 16 -8, 24 -32, 17 -50 C 6 -38, -2 -20, 0 -10 Z" fill="#C9B486" opacity="0.9"/>
        <path d="M0 -10 C -7 -18, -9 -36, -2 -50 C 7 -36, 5 -18, 0 -10 Z" fill="#D8C490" opacity="0.95"/>
      </g>
      <path d="M-6 150 Q -26 146, -46 132 Q -26 178, -4 170 Z" fill="url(#leafA)" opacity="0.6"/>
    </g>
  </svg>

  <svg class="ff-flora ff-flora--right" viewBox="0 0 190 700" preserveAspectRatio="xMinYMin meet" aria-hidden="true">
    <defs>
      <linearGradient id="leafB" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#8FA084" stop-opacity="0.9"/><stop offset="1" stop-color="#5A6E45" stop-opacity="0.55"/>
      </linearGradient>
      <linearGradient id="stemB" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#7E8B62"/><stop offset="1" stop-color="#46552F"/>
      </linearGradient>
      <linearGradient id="budB" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#E0CFA8"/><stop offset="1" stop-color="#B7A06E"/>
      </linearGradient>
    </defs>
    <g>
      <path d="M52 12 Q 66 140, 40 290 Q 64 430, 78 560 Q 70 640, 56 690" stroke="url(#stemB)" stroke-width="1.4" fill="none"/>
      <ellipse cx="50" cy="86"  rx="12" ry="8"  fill="url(#leafB)" transform="rotate(-16 50 86)"/>

      <ellipse cx="68" cy="420" rx="11" ry="7"  fill="url(#leafB)" transform="rotate(20 68 420)"/>
    </g>
    <g transform="translate(112 300)">
      <path d="M0 0 Q 2 130, -6 260 Q -10 360, 1 420" stroke="url(#stemB)" stroke-width="1.6" fill="none"/>
      <path d="M-6 120 Q -26 116, -46 102 Q -26 148, -4 140 Z" fill="url(#leafB)" opacity="0.6"/>
    </g>
  </svg>

  <main id="formRoot">
    <div class="ff-card ff-msg"><p>Carregando…</p></div>

  <script type="module" src="./forms.js"></script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TULIPA — links</title>
  <meta name="description" content="TULIPA · Tessitura Universitária de Linguagens em Psicologia Analítica. Conheça o projeto e o atendimento social pela Allos." />
  <meta name="theme-color" content="#1F1410" />
  <meta name="color-scheme" content="dark" />
  <meta name="format-detection" content="telephone=no" />
  <meta property="og:title" content="TULIPA — links" />
  <meta property="og:description" content="O Linktree da TULIPA — Psicologia Analítica Junguiana UNICAP." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 20 C 35 30, 30 50, 35 65 C 40 78, 50 80, 50 80 C 50 80, 60 78, 65 65 C 70 50, 65 30, 50 20 Z' fill='%235C2230'/%3E%3Cpath d='M50 78 L50 95' stroke='%234A5C36' stroke-width='2' fill='none'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="bio.css" />
</head>
<body>
  <!-- Decoração ambiental: blobs suaves de cor -->
  <div class="bio-ambient" aria-hidden="true">
    <span class="bio-petal bio-petal--a"></span>
    <span class="bio-petal bio-petal--b"></span>
    <span class="bio-petal bio-petal--c"></span>
  </div>

  <!-- Flores secas decorativas (espelho da home) -->
  <svg class="bio-flora bio-flora--left" viewBox="0 0 200 700" aria-hidden="true" preserveAspectRatio="xMinYMin meet">
    <defs>
      <linearGradient id="bioPetal" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#B68196" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#7A5260" stop-opacity="0.55"/>
      </linearGradient>
      <linearGradient id="bioLeaf" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#8FA084" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#6B7E55" stop-opacity="0.45"/>
      </linearGradient>
      <linearGradient id="bioStem" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#A0876A" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#5A4A38" stop-opacity="0.75"/>
      </linearGradient>
    </defs>

    <!-- EUCALIPTO curvado descendo -->
    <g class="bio-flora__sprig bio-flora__sprig--sway">
      <path d="M40 10 Q 56 130, 32 270 Q 56 410, 72 540 Q 64 620, 50 680" stroke="url(#bioStem)" stroke-width="1.3" fill="none"/>
      <ellipse cx="46" cy="62"  rx="11" ry="7"   fill="url(#bioLeaf)" transform="rotate(-15 46 62)" opacity="0.78"/>
      <ellipse cx="56" cy="104" rx="12" ry="8"   fill="url(#bioLeaf)" transform="rotate(22 56 104)" opacity="0.74"/>
      <ellipse cx="39" cy="148" rx="11" ry="7.5" fill="url(#bioLeaf)" transform="rotate(-13 39 148)" opacity="0.8"/>
      <ellipse cx="52" cy="194" rx="12" ry="8"   fill="url(#bioLeaf)" transform="rotate(18 52 194)" opacity="0.72"/>
      <ellipse cx="33" cy="240" rx="11" ry="7.5" fill="url(#bioLeaf)" transform="rotate(-10 33 240)" opacity="0.78"/>
      <ellipse cx="46" cy="288" rx="11" ry="7"   fill="url(#bioLeaf)" transform="rotate(15 46 288)" opacity="0.7"/>
      <ellipse cx="50" cy="338" rx="11" ry="7"   fill="url(#bioLeaf)" transform="rotate(-8 50 338)" opacity="0.78"/>
      <ellipse cx="60" cy="386" rx="10" ry="6.5" fill="url(#bioLeaf)" transform="rotate(22 60 386)" opacity="0.7"/>
      <ellipse cx="66" cy="432" rx="10" ry="7"   fill="url(#bioLeaf)" transform="rotate(-12 66 432)" opacity="0.74"/>
      <ellipse cx="74" cy="478" rx="9"  ry="6"   fill="url(#bioLeaf)" transform="rotate(18 74 478)" opacity="0.66"/>
    </g>

    <!-- LAVANDA seca (à direita do eucalipto) -->
    <g class="bio-flora__sprig bio-flora__sprig--sway-slow">
      <path d="M120 700 Q 124 510, 114 310 Q 110 210, 121 140" stroke="url(#bioStem)" stroke-width="1.4" fill="none"/>
      <ellipse cx="121" cy="132" rx="4"   ry="7.5" fill="#A5778C" opacity="0.85"/>
      <ellipse cx="117" cy="148" rx="3.5" ry="6.5" fill="#9F6E84" opacity="0.82"/>
      <ellipse cx="122" cy="162" rx="3.5" ry="6.5" fill="#A5778C" opacity="0.78"/>
      <ellipse cx="116" cy="176" rx="3"   ry="6"   fill="#956A7F" opacity="0.78"/>
      <ellipse cx="120" cy="190" rx="3"   ry="6"   fill="#A5778C" opacity="0.75"/>
      <ellipse cx="114" cy="204" rx="2.8" ry="5.5" fill="#8E6478" opacity="0.72"/>
      <ellipse cx="119" cy="218" rx="2.6" ry="5"   fill="#8E6478" opacity="0.68"/>
    </g>
  </svg>

  <svg class="bio-flora bio-flora--right" viewBox="0 0 200 700" aria-hidden="true" preserveAspectRatio="xMaxYMax meet">
    <defs>
      <linearGradient id="bioPetal2" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#B68196" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#7A5260" stop-opacity="0.6"/>
      </linearGradient>
      <linearGradient id="bioLeaf2" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#8FA084" stop-opacity="0.78"/>
        <stop offset="100%" stop-color="#6B7E55" stop-opacity="0.45"/>
      </linearGradient>
      <linearGradient id="bioStem2" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#A0876A" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#5A4A38" stop-opacity="0.78"/>
      </linearGradient>
    </defs>

    <!-- TULIPA SECA pendente (focal — espelho da home) -->
    <g class="bio-flora__sprig bio-flora__sprig--sway">
      <path d="M132 690 Q 134 540, 126 380 Q 122 270, 133 220" stroke="url(#bioStem2)" stroke-width="1.8" fill="none"/>
      <path d="M128 432 Q 106 428, 82 412 Q 106 462, 130 454 Z" fill="url(#bioLeaf2)" opacity="0.62"/>
      <path d="M129 488 Q 152 482, 176 470 Q 152 514, 130 508 Z" fill="url(#bioLeaf2)" opacity="0.56"/>
      <g transform="translate(133 220)">
        <path d="M0 0 C -20 -10, -28 -36, -18 -56 C -8 -42, -2 -22, 0 -10 Z" fill="url(#bioPetal2)" opacity="0.88"/>
        <path d="M0 -2 C 18 -8, 27 -33, 19 -53 C 7 -40, -2 -22, 0 -10 Z" fill="#9C6F84" opacity="0.82"/>
        <path d="M0 -10 C -8 -18, -10 -38, -2 -52 C 8 -38, 6 -20, 0 -10 Z" fill="#A5788C" opacity="0.9"/>
        <path d="M-4 -30 Q 0 -42, 4 -30" stroke="#C49AA8" stroke-width="0.6" fill="none" opacity="0.6"/>
        <ellipse cx="0" cy="-14" rx="2" ry="3" fill="#5A3A48" opacity="0.42"/>
      </g>
    </g>

    <!-- Pétala translúcida solta -->
    <g class="bio-flora__petal bio-flora__petal--float" transform="translate(56 470)">
      <ellipse cx="0" cy="0" rx="36" ry="22" fill="url(#bioPetal2)" opacity="0.55" transform="rotate(-22)"/>
      <ellipse cx="-3" cy="-4" rx="28" ry="16" fill="#D9B0C0" opacity="0.42" transform="rotate(-25)"/>
      <path d="M-30 0 Q 0 -8, 30 4" stroke="#5A3A48" stroke-width="0.4" fill="none" opacity="0.3" transform="rotate(-22)"/>
    </g>
  </svg>

  <main class="bio" id="bioRoot">
    <!-- esqueleto de carregamento (substituído pelo JS) -->
    <header class="bio__head">
      <div class="bio__avatar bio__avatar--skel"></div>
      <div class="bio__name bio__name--skel"></div>
      <div class="bio__tagline bio__tagline--skel"></div>
    </header>
    <div class="bio__cards" id="bioCards"></div>
  </main>

  <footer class="bio__foot">
    <a href="../" class="bio__back">↩ ir ao site</a>
    <span class="bio__credit">tulipa · unicap</span>
  </footer>

  <script type="module" src="./bio.js"></script>
</body>
</html>
